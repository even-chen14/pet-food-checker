<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毛孩安全查詢｜食物 & 香氛</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FDF6EE;
    --surface: #FFFAF4;
    --border: #E8D5B7;
    --text: #2C1A0E;
    --muted: #8B6B4A;
    --accent-warm: #C8602A;
    --accent-gold: #D4A853;
    --safe: #3A7D44;
    --safe-bg: #EDF7EF;
    --danger: #B83232;
    --danger-bg: #FDEAEA;
    --warning: #9A6B00;
    --warning-bg: #FFF8E1;
    --cat: #7B4F9E;
    --cat-bg: #F3EEF9;
    --dog: #2A6DB5;
    --dog-bg: #EBF3FD;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* Texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C8602A' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .header-icon {
    font-size: 52px;
    display: block;
    margin-bottom: 12px;
    filter: drop-shadow(0 4px 8px rgba(200,96,42,0.2));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(26px, 5vw, 38px);
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
    line-height: 1.3;
  }

  h1 span {
    color: var(--accent-warm);
  }

  .subtitle {
    margin-top: 8px;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.03em;
  }

  /* Query type toggle */
  .query-type-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    background: var(--bg);
    border-radius: 12px;
    padding: 5px;
    border: 1.5px solid var(--border);
  }

  .type-btn {
    flex: 1;
    padding: 9px 12px;
    border: none;
    border-radius: 9px;
    background: transparent;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .type-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(44,26,14,0.1);
    font-weight: 600;
  }

  .type-btn.active[data-type="food"] { color: var(--accent-warm); }
  .type-btn.active[data-type="aroma"] { color: #5A8A4A; }

  /* Aroma tag */
  .aroma-tag {
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    background: #EEF7EB;
    color: #3D6E30;
    border: 1px solid #B2D9A8;
  }

  .exposure-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .exposure-tag {
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .exposure-tag.safe-exp { background: var(--safe-bg); color: var(--safe); border: 1px solid #A8D5B0; }
  .exposure-tag.danger-exp { background: var(--danger-bg); color: var(--danger); border: 1px solid #F0AAAA; }
  .exposure-tag.caution-exp { background: var(--warning-bg); color: var(--warning); border: 1px solid #F0D070; }

  .aroma-info-box {
    background: #EEF7EB;
    border: 1px solid #B2D9A8;
    border-radius: 12px;
    padding: 13px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #3D6E30;
    line-height: 1.65;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .result-type-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }

  .result-type-badge.food-type { background: #FDEEDE; color: var(--accent-warm); }
  .result-type-badge.aroma-type { background: #EEF7EB; color: #3D6E30; }

  /* Search card */
  .search-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 4px 24px rgba(44,26,14,0.07), 0 1px 4px rgba(44,26,14,0.05);
    margin-bottom: 28px;
  }

  .pet-toggle {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .pet-btn {
    flex: 1;
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: transparent;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.22s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .pet-btn .emoji { font-size: 22px; }

  .pet-btn.active[data-pet="cat"] {
    border-color: var(--cat);
    background: var(--cat-bg);
    color: var(--cat);
    box-shadow: 0 2px 12px rgba(123,79,158,0.15);
  }

  .pet-btn.active[data-pet="dog"] {
    border-color: var(--dog);
    background: var(--dog-bg);
    color: var(--dog);
    box-shadow: 0 2px 12px rgba(42,109,181,0.15);
  }

  .pet-btn:hover:not(.active) {
    border-color: var(--accent-gold);
    background: #FFFBF0;
    color: var(--text);
  }

  .search-row {
    display: flex;
    gap: 10px;
  }

  .search-input {
    flex: 1;
    padding: 14px 18px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--bg);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input::placeholder { color: #C4A882; }

  .search-input:focus {
    border-color: var(--accent-warm);
    box-shadow: 0 0 0 3px rgba(200,96,42,0.1);
  }

  .search-btn {
    padding: 14px 24px;
    background: var(--accent-warm);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  .search-btn:hover { background: #A84E22; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(200,96,42,0.3); }
  .search-btn:active { transform: translateY(0); }
  .search-btn:disabled { background: #C4A882; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  .loading.show { display: block; }

  .paw-loader {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .paw-loader span {
    font-size: 24px;
    animation: paw-bounce 0.8s ease-in-out infinite;
  }

  .paw-loader span:nth-child(2) { animation-delay: 0.15s; }
  .paw-loader span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes paw-bounce {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.5; }
    50% { transform: translateY(-8px) scale(1.15); opacity: 1; }
  }

  /* Result card */
  .result-card {
    display: none;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 4px 24px rgba(44,26,14,0.07);
    animation: slide-up 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    margin-bottom: 28px;
  }

  .result-card.show { display: block; }

  @keyframes slide-up {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 22px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }

  .food-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.03em;
    flex-shrink: 0;
  }

  .status-badge.safe { background: var(--safe-bg); color: var(--safe); border: 1px solid #A8D5B0; }
  .status-badge.danger { background: var(--danger-bg); color: var(--danger); border: 1px solid #F0AAAA; }
  .status-badge.caution { background: var(--warning-bg); color: var(--warning); border: 1px solid #F0D070; }

  .pet-tags {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .pet-tag {
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
  }

  .pet-tag.cat { background: var(--cat-bg); color: var(--cat); }
  .pet-tag.dog { background: var(--dog-bg); color: var(--dog); }

  .result-section {
    margin-bottom: 18px;
  }

  .result-section h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .result-section p {
    font-size: 15px;
    line-height: 1.75;
    color: var(--text);
  }

  .toxin-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .toxin-tag {
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 13px;
    background: var(--danger-bg);
    color: var(--danger);
    border: 1px solid #F0AAAA;
    font-weight: 500;
  }

  .symptom-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .symptom-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
  }

  .symptom-item::before {
    content: '•';
    color: var(--accent-warm);
    font-weight: bold;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .emergency-section {
    margin-top: 22px;
    border: 2px solid var(--danger);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(184,50,50,0.12);
  }

  .emergency-header {
    background: var(--danger);
    color: white;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.04em;
  }

  .emergency-header .blink {
    display: inline-block;
    width: 10px; height: 10px;
    background: white;
    border-radius: 50%;
    animation: blink 1s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .emergency-body {
    background: var(--danger-bg);
    padding: 18px;
  }

  .emergency-steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }

  .emergency-step {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: white;
    border-radius: 10px;
    padding: 11px 14px;
    border: 1px solid #F0AAAA;
  }

  .step-num {
    background: var(--danger);
    color: white;
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .step-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
  }

  .step-text strong {
    color: var(--danger);
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }

  .do-not-box {
    background: #FFF0F0;
    border: 1px solid #F0AAAA;
    border-radius: 10px;
    padding: 11px 14px;
    margin-bottom: 12px;
  }

  .do-not-box .label {
    font-size: 12px;
    font-weight: 700;
    color: var(--danger);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  .do-not-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .do-not-item {
    font-size: 13px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .do-not-item::before {
    content: '✕';
    color: var(--danger);
    font-weight: 700;
    font-size: 11px;
    flex-shrink: 0;
  }

  .vet-hotline {
    background: white;
    border: 1.5px solid var(--danger);
    border-radius: 10px;
    padding: 11px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .vet-hotline .icon { font-size: 22px; flex-shrink: 0; }
  .vet-hotline p { font-size: 13px; color: var(--danger); line-height: 1.6; font-weight: 600; }
  .vet-hotline p span { display: block; font-size: 12px; font-weight: 400; color: var(--muted); margin-top: 2px; }

  .emergency-box {
    background: var(--danger-bg);
    border: 1px solid #F0AAAA;
    border-radius: 12px;
    padding: 14px 18px;
    margin-top: 18px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .emergency-box .icon { font-size: 20px; flex-shrink: 0; }
  .emergency-box p { font-size: 13px; color: var(--danger); line-height: 1.6; }
  .emergency-box strong { display: block; font-size: 14px; margin-bottom: 2px; }

  .safe-box {
    background: var(--safe-bg);
    border: 1px solid #A8D5B0;
    border-radius: 12px;
    padding: 14px 18px;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .safe-box .icon { font-size: 22px; }
  .safe-box p { font-size: 14px; color: var(--safe); line-height: 1.6; }

  /* Common foods quick grid */
  .quick-section {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 4px 24px rgba(44,26,14,0.07);
  }

  .quick-section h2 {
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .quick-section .desc {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 18px;
  }

  .quick-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .quick-tab {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.18s;
  }

  .quick-tab.active {
    background: var(--danger-bg);
    border-color: #F0AAAA;
    color: var(--danger);
    font-weight: 600;
  }

  .quick-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
  }

  .quick-item {
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 7px;
    font-weight: 500;
    border: 1px solid transparent;
  }

  .quick-item.danger-item {
    background: var(--danger-bg);
    color: var(--danger);
    border-color: #F0AAAA;
  }

  .quick-item.danger-item:hover {
    background: #FAD0D0;
    transform: scale(1.03);
  }

  .quick-item.safe-item {
    background: var(--safe-bg);
    color: var(--safe);
    border-color: #A8D5B0;
  }

  .quick-item.safe-item:hover {
    background: #C8EDD0;
    transform: scale(1.03);
  }

  /* Error */
  .error-card {
    display: none;
    background: var(--warning-bg);
    border: 1.5px solid #F0D070;
    border-radius: 16px;
    padding: 20px 24px;
    color: var(--warning);
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 28px;
    animation: slide-up 0.3s ease;
  }

  .error-card.show { display: block; }

  footer {
    text-align: center;
    margin-top: 48px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.8;
  }

  @media (max-width: 480px) {
    .search-row { flex-direction: column; }
    .quick-grid { grid-template-columns: repeat(3, 1fr); }
    .pet-toggle { flex-direction: row; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="header-icon">🐾</span>
    <h1>毛孩<span>安全</span>查詢</h1>
    <p class="subtitle">食物・香氛植物・精油成分，全面守護毛孩健康</p>
  </header>

  <div class="search-card">
    <!-- Query type -->
    <div class="query-type-toggle">
      <button class="type-btn active" data-type="food" onclick="selectType('food')">
        🍖 食物查詢
      </button>
      <button class="type-btn" data-type="aroma" onclick="selectType('aroma')">
        🌿 香氛／植物
      </button>
    </div>
    <!-- Pet toggle -->
    <div class="pet-toggle">
      <button class="pet-btn active" data-pet="cat" onclick="selectPet('cat')">
        <span class="emoji">🐱</span> 貓咪
      </button>
      <button class="pet-btn" data-pet="dog" onclick="selectPet('dog')">
        <span class="emoji">🐶</span> 狗狗
      </button>
      <button class="pet-btn" data-pet="both" onclick="selectPet('both')">
        <span class="emoji">🐾</span> 兩者
      </button>
    </div>
    <div class="search-row">
      <input
        type="text"
        class="search-input"
        id="foodInput"
        placeholder="例：葡萄、雞肉、牛奶、洋蔥…"
        onkeydown="if(event.key==='Enter') search()"
      />
      <button class="search-btn" id="searchBtn" onclick="search()">查詢 →</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="paw-loader">
      <span>🐾</span><span>🐾</span><span>🐾</span>
    </div>
    <p id="loadingText">正在查詢安全資訊…</p>
  </div>

  <div class="error-card" id="errorCard"></div>
  <div class="result-card" id="resultCard"></div>

  <div class="quick-section">
    <h2>常見危險項目速覽</h2>
    <p class="desc">點擊任一項目可快速查詢詳細資訊</p>
    <div class="quick-tabs">
      <button class="quick-tab active" onclick="showQuick('danger')">⚠️ 危險食物</button>
      <button class="quick-tab" onclick="showQuick('safe')">✅ 安全食物</button>
      <button class="quick-tab" onclick="showQuick('aroma_danger')">🌿 危險香氛</button>
    </div>
    <div class="quick-grid" id="quickGrid"></div>
  </div>

  <footer>
    <p>⚠️ 本查詢結果由 AI 提供，僅供參考。</p>
    <p>若毛孩誤食危險食物，請立即聯繫獸醫。</p>
  </footer>
</div>

<script>
let selectedPet = 'cat';
let selectedType = 'food';
let currentQuickTab = 'danger';

const quickFoods = {
  danger: [
    { emoji: '🍇', name: '葡萄' },

function selectType(type) {
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === type);
  });
  const input = document.getElementById('foodInput');
  if (type === 'food') {
    input.placeholder = '例：葡萄、雞肉、牛奶、洋蔥…';
  } else {
    input.placeholder = '例：茶樹精油、薰衣草、百合花、薄荷…';
  }
}

function renderQuick() {
  const grid = document.getElementById('quickGrid');
  const items = quickFoods[currentQuickTab] || [];
  const isAroma = currentQuickTab === 'aroma_danger';
  const isDanger = currentQuickTab === 'danger' || isAroma;
  grid.innerHTML = items.map(f =>
    `<div class="quick-item ${isDanger ? 'danger-item' : 'safe-item'}"
      onclick="quickSearch('${f.name}', '${isAroma ? 'aroma' : 'food'}')">
      <span>${f.emoji}</span><span>${f.name}</span>
    </div>`
  ).join('');
}

function showQuick(tab) {
  currentQuickTab = tab;
  document.querySelectorAll('.quick-tab').forEach((btn, i) => {
    btn.classList.toggle('active',
      (i === 0 && tab === 'danger') ||
      (i === 1 && tab === 'safe') ||
      (i === 2 && tab === 'aroma_danger')
    );
  });
  renderQuick();
}

function quickSearch(name, type) {
  if (type) selectType(type);
  document.getElementById('foodInput').value = name;
  search();
}

function selectPet(pet) {
  selectedPet = pet;
  document.querySelectorAll('.pet-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.pet === pet);
  });
}

async function search() {
  const query = document.getElementById('foodInput').value.trim();
  if (!query) return;

  const petLabel = selectedPet === 'cat' ? '貓咪' : selectedPet === 'dog' ? '狗狗' : '貓咪和狗狗';
  const isAroma = selectedType === 'aroma';

  document.getElementById('loading').classList.add('show');
  document.getElementById('loadingText').textContent = isAroma ? '正在查詢香氛安全資訊…' : '正在查詢食物安全資訊…';
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('errorCard').classList.remove('show');
  document.getElementById('searchBtn').disabled = true;

  const foodPrompt = `你是一位寵物營養與毒理學專家。請分析食物「${query}」對${petLabel}是否安全。

請用以下 JSON 格式回覆（只回 JSON，不要其他文字）：
{
  "name": "食物名稱",
  "queryType": "food",
  "status": "safe" 或 "danger" 或 "caution",
  "statusLabel": "安全" 或 "危險" 或 "需注意",
  "pets": ["cat"] 或 ["dog"] 或 ["cat","dog"],
  "summary": "一句話總結（20字以內）",
  "details": "詳細說明（100字以內）",
  "toxins": ["有毒成分1"]（若安全則空陣列）,
  "symptoms": ["中毒症狀1"]（若安全則空陣列，最多5項）,
  "emergencySteps": [{"title": "步驟標題（6字內）", "desc": "具體說明（30字內）"}]（若安全則空陣列，危險時提供3-4步）,
  "doNotDo": ["不可做的事"]（若安全則空陣列，最多3項）,
  "tip": "額外提醒（20字以內，可空字串）"
}`;

  const aromaPrompt = `你是一位寵物安全與芳療毒理學專家。請分析香氛植物或成分「${query}」對${petLabel}的安全性。
重點分析：吸入擴香、皮膚接觸、誤食三種暴露途徑的風險。

請用以下 JSON 格式回覆（只回 JSON，不要其他文字）：
{
  "name": "植物或成分名稱",
  "queryType": "aroma",
  "status": "safe" 或 "danger" 或 "caution",
  "statusLabel": "安全" 或 "危險" 或 "需注意",
  "pets": ["cat"] 或 ["dog"] 或 ["cat","dog"],
  "summary": "一句話總結（20字以內）",
  "details": "詳細說明（100字以內，包含為何對此寵物危險）",
  "toxins": ["有毒成分或原因1"]（若安全則空陣列）,
  "exposureRisks": [
    {"route": "吸入擴香", "level": "safe" 或 "danger" 或 "caution", "desc": "說明（20字內）"},
    {"route": "皮膚接觸", "level": "safe" 或 "danger" 或 "caution", "desc": "說明（20字內）"},
    {"route": "誤食", "level": "safe" 或 "danger" 或 "caution", "desc": "說明（20字內）"}
  ],
  "symptoms": ["中毒或過敏症狀1"]（若安全則空陣列，最多5項）,
  "safeAlternatives": ["較安全的替代香氛1", "替代香氛2"]（若本身安全則空陣列，最多3項）,
  "emergencySteps": [{"title": "步驟標題（6字內）", "desc": "具體說明（30字內）"}]（若安全則空陣列，危險時提供3-4步）,
  "doNotDo": ["不可做的事"]（若安全則空陣列，最多3項）,
  "tip": "使用建議或提醒（25字以內，可空字串）"
}`;

  const prompt = isAroma ? aromaPrompt : foodPrompt;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);
    showResult(result);
  } catch (e) {
    const errorCard = document.getElementById('errorCard');
    errorCard.textContent = '⚠️ 查詢失敗，請稍後再試。可能是網路問題或 API 連線異常。';
    errorCard.classList.add('show');
  } finally {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('searchBtn').disabled = false;
  }
}

function showResult(r) {
  const card = document.getElementById('resultCard');
  const statusIcon = r.status === 'safe' ? '✅' : r.status === 'danger' ? '🚫' : '⚠️';
  const isAroma = r.queryType === 'aroma';
  const petTagsHtml = (r.pets || [selectedPet]).map(p =>
    `<span class="pet-tag ${p}">${p === 'cat' ? '🐱 貓咪' : '🐶 狗狗'}</span>`
  ).join('');

  const typeIcon = isAroma ? '🌿' : '🍽';
  const typeBadge = isAroma
    ? `<span class="result-type-badge aroma-type">🌿 香氛／植物</span>`
    : `<span class="result-type-badge food-type">🍖 食物</span>`;

  let html = `
    <div class="result-header">
      <div>
        ${typeBadge}
        <div class="food-name">${typeIcon} ${r.name || r.food}</div>
      </div>
      <span class="status-badge ${r.status}">${statusIcon} ${r.statusLabel}</span>
    </div>
    <div class="pet-tags">${petTagsHtml}</div>
    <div class="result-section">
      <h3>總結</h3>
      <p>${r.summary}</p>
    </div>
    <div class="result-section">
      <h3>詳細說明</h3>
      <p>${r.details}</p>
    </div>
  `;

  // Aroma: exposure risks
  if (isAroma && r.exposureRisks && r.exposureRisks.length > 0) {
    const levelLabel = { safe: '安全', danger: '危險', caution: '需注意' };
    html += `
      <div class="result-section">
        <h3>暴露途徑風險</h3>
        <div class="exposure-list">
          ${r.exposureRisks.map(e => `
            <div class="exposure-tag ${e.level}-exp">
              ${e.route === '吸入擴香' ? '💨' : e.route === '皮膚接觸' ? '🤚' : '👅'}
              <span><strong>${e.route}</strong>：${e.desc}</span>
            </div>`).join('')}
        </div>
      </div>`;
  }

  // Toxins
  if (r.toxins && r.toxins.length > 0) {
    html += `
      <div class="result-section">
        <h3>${isAroma ? '危險成分／原因' : '有害成分'}</h3>
        <div class="toxin-list">
          ${r.toxins.map(t => `<span class="toxin-tag">⚗️ ${t}</span>`).join('')}
        </div>
      </div>`;
  }

  // Symptoms
  if (r.symptoms && r.symptoms.length > 0) {
    html += `
      <div class="result-section">
        <h3>可能症狀</h3>
        <div class="symptom-list">
          ${r.symptoms.map(s => `<div class="symptom-item">${s}</div>`).join('')}
        </div>
      </div>`;
  }

  // Aroma: safe alternatives
  if (isAroma && r.safeAlternatives && r.safeAlternatives.length > 0) {
    html += `
      <div class="result-section">
        <h3>較安全的替代選擇</h3>
        <div class="toxin-list">
          ${r.safeAlternatives.map(a => `<span class="toxin-tag" style="background:var(--safe-bg);color:var(--safe);border-color:#A8D5B0;">🌿 ${a}</span>`).join('')}
        </div>
      </div>`;
  }

  // Emergency steps
  if ((r.emergencySteps && r.emergencySteps.length > 0) || (r.doNotDo && r.doNotDo.length > 0)) {
    const emergencyTitle = isAroma ? '🚨 暴露後緊急處理步驟' : '🚨 誤食緊急處理步驟';
    html += `<div class="emergency-section">
      <div class="emergency-header">
        <span class="blink"></span>
        ${emergencyTitle}
      </div>
      <div class="emergency-body">`;

    if (r.emergencySteps && r.emergencySteps.length > 0) {
      html += `<div class="emergency-steps">
        ${r.emergencySteps.map((s, i) => `
          <div class="emergency-step">
            <div class="step-num">${i + 1}</div>
            <div class="step-text">
              <strong>${s.title}</strong>
              ${s.desc}
            </div>
          </div>`).join('')}
      </div>`;
    }

    if (r.doNotDo && r.doNotDo.length > 0) {
      html += `<div class="do-not-box">
        <div class="label">⛔ 絕對不可做</div>
        <div class="do-not-list">
          ${r.doNotDo.map(d => `<div class="do-not-item">${d}</div>`).join('')}
        </div>
      </div>`;
    }

    html += `<div class="vet-hotline">
        <span class="icon">📞</span>
        <p>請立即聯繫獸醫或動物急救中心
          <span>不確定症狀嚴重程度時，務必以最快速度就醫</span>
        </p>
      </div>
      </div>
    </div>`;
  }

  // Safe / tip
  if (r.status === 'safe') {
    html += `
      <div class="safe-box">
        <span class="icon">${isAroma ? '🌿' : '🎉'}</span>
        <p>${isAroma ? '這個香氛對毛孩相對安全！' : '這個食物對毛孩是安全的！'}${r.tip ? ' ' + r.tip : (isAroma ? '仍建議保持通風、避免過量。' : '適量餵食即可。')}</p>
      </div>`;
  } else if (r.tip) {
    html += `
      <div style="margin-top:14px; padding:12px 16px; background:#FFF8E1; border-radius:10px; border:1px solid #F0D070; font-size:13px; color:#9A6B00;">
        💡 ${r.tip}
      </div>`;
  }

  card.innerHTML = html;
  card.classList.add('show');
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// Init
renderQuick();
</script>

</html>
